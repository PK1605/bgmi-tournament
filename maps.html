    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bgmi-bg-canvas" id="bgmiCanvas"></div>

<nav class="navbar">
    <a href="index.html" class="nav-logo">MALWA ESPORTS</a>
    <button type="button" class="mobile-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>

        <li><a href="admin.html" class="nav-admin">Admin</a></li>
        <li><a href="register.html" class="nav-cta">Register</a></li>
    </ul>
</nav>

<div class="page-top"></div>

<section class="map-showcase" id="maps">
    <div class="section">
        <div class="section-header fade-in">
            <div class="section-label" id="mapLabel">Loading...</div>
            <h2 class="section-title">Tonight's Battlegrounds</h2>
            <div class="section-line"></div>
        </div>
        <div class="map-grid" id="mapGrid">
            <div style="text-align:center;color:#555;padding:40px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;">Loading schedule...</div>
        </div>
    </div>
</section>

<footer class="footer">
    &copy; 2026 <span>Malwa Esports Private Limited</span><br>
    <span style="font-size:0.8rem;color:#555;">Founded by Purushottam Patidar</span><br>
    <span style="font-size:0.78rem;color:#444;margin-top:4px;display:inline-block;">7489244521 | malwaesports@1605.com</span>
</footer>

<script>
(function(){
    var mapImages = {
        'erangel': 'assets/Erangle.webp',
        'miramar': 'assets/Miramar.webp',
        'rondo': 'assets/Rondo.webp'
    };

    function getMapImage(name) {
        var key = (name || '').toLowerCase().trim();
        return mapImages[key] || 'assets/' + name + '.webp';
    }

    fetch('/api/settings')
        .then(function(r){ return r.json(); })
        .then(function(d){
            var tournaments = d.tournaments || [];
            var active = tournaments.filter(function(t){ return t.status === 'active'; })[0] || tournaments[0];
            if (!active) {
                document.getElementById('mapLabel').textContent = 'No schedule available';
                document.getElementById('mapGrid').innerHTML = '<div style="text-align:center;color:#555;padding:40px;font-family:Rajdhani,sans-serif;">No active tournament found.</div>';
                return;
            }

            var schedule = active.mapSchedule || [];
            if (!schedule.length && active.maps && active.maps.length) {
                active.maps.forEach(function(m, i){
                    schedule.push({ matchNum: i+1, map: m, time: active.time || '', desc: '' });
                });
            }

            document.getElementById('mapLabel').textContent = active.name + ' \u2022 ' + (schedule[0] && schedule[0].time ? schedule[0].time : active.time || '');

            var grid = document.getElementById('mapGrid');
            if (!schedule.length) {
                grid.innerHTML = '<div style="text-align:center;color:#555;padding:40px;font-family:Rajdhani,sans-serif;">No matches scheduled.</div>';
                return;
            }

            var html = '';
            schedule.forEach(function(m){
                html += '<div class="map-card fade-in">';
                html += '<div class="map-card-bg" style="background-image:url(\'' + getMapImage(m.map) + '\')"></div>';
                html += '<div class="map-card-overlay"></div>';
                html += '<div class="map-badge">' + (m.time || '') + '</div>';
                html += '<div class="map-card-content">';
                html += '<div class="map-match-num">Match ' + m.matchNum + '</div>';
                html += '<div class="map-name">' + m.map.toUpperCase() + '</div>';
                html += '<div class="map-desc">' + (m.desc || active.mode + ' — ' + active.perspective) + '</div>';
                html += '</div></div>';
            });
            grid.innerHTML = html;

            var observer = new IntersectionObserver(function(entries){
                entries.forEach(function(e){ if(e.isIntersecting) e.target.classList.add('visible'); });
            },{threshold:0.1});
            document.querySelectorAll('.fade-in').forEach(function(el){ observer.observe(el); });
        })
        .catch(function(){
            document.getElementById('mapLabel').textContent = 'Error loading';
            document.getElementById('mapGrid').innerHTML = '<div style="text-align:center;color:#e74c3c;padding:40px;">Failed to load schedule.</div>';
        });

    document.querySelector('.navbar').addEventListener('click',function(e){
        if(e.target.tagName==='A') document.querySelector('.nav-links').classList.remove('open');
    });
})();

(function(){
    var c=document.getElementById('bgmiCanvas'); if(!c) return;
    var icons=['<svg viewBox="0 0 24 60" fill="currentColor"><rect x="6" y="0" width="12" height="40" rx="6" ry="6"/><rect x="4" y="36" width="16" height="20" rx="2"/><rect x="6" y="52" width="12" height="8" rx="1"/></svg>','<svg viewBox="0 0 60 50" fill="currentColor"><path d="M10,35 Q10,8 30,5 Q50,8 50,35 L48,40 Q30,45 12,40Z"/><rect x="8" y="35" width="44" height="6" rx="3"/></svg>','<svg viewBox="0 0 40 55" fill="currentColor"><rect x="14" y="0" width="12" height="10" rx="2"/><ellipse cx="20" cy="35" rx="16" ry="20"/></svg>','<svg viewBox="0 0 50 50" fill="none" stroke="currentColor" stroke-width="2"><circle cx="25" cy="25" r="18"/><circle cx="25" cy="25" r="8"/><line x1="25" y1="2" x2="25" y2="15"/><line x1="25" y1="35" x2="25" y2="48"/><line x1="2" y1="25" x2="15" y2="25"/><line x1="35" y1="25" x2="48" y2="25"/></svg>'];
    for(var i=0;i<20;i++){var el=document.createElement('div');el.className='float-icon';el.innerHTML=icons[Math.floor(Math.random()*icons.length)];var s=20+Math.random()*35,l=Math.random()*100,d=18+Math.random()*30,dl=Math.random()*-40,o=0.02+Math.random()*0.04;el.style.cssText='left:'+l+'%;width:'+s+'px;height:'+s+'px;color:rgba(255,107,0,'+(o/0.04)+');opacity:'+o+';animation-duration:'+d+'s;animation-delay:'+dl+'s;';c.appendChild(el);}
})();
</script>

</body>
</html>
